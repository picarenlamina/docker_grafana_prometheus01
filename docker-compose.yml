version: '3.8'

services:
  # 🗄️ MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app_user", "-papp_pass"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ⚡ PHP-FPM
  php:
    image: php:8.2-fpm
    container_name: php
    restart: always
    volumes:
      - ./php:/var/www/html
      - ./php/php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf # habilitar status
    networks:
      - backend

  # 🌐 Nginx
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./php:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - backend

  mysqld_exporter:
    image: prom/mysqld-exporter:v0.15.0 # Using a slightly older, more stable version for env vars
    container_name: mysqld_exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=root:root@(mysql:3306)/
    # We remove the "command" flags for now to let the entrypoint use the ENV variable
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend
  # ⚡ Exportador PHP-FPM
  php_fpm_exporter:
    image: hipages/php-fpm_exporter
    container_name: php_fpm_exporter
    restart: always
    environment:
      - PHP_FPM_SCRAPE_URI=tcp://php:9000/status
    depends_on:
      - php
    networks:
      - backend

  # 📊 Prometheus
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
    depends_on:
      - mysqld_exporter
      - php_fpm_exporter
    networks:
      - backend

  # 📈 Grafana
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
  grafana_data:
